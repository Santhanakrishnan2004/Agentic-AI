<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Research Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1rem;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }

    input:focus { border-color: #555; }

    button {
      padding: 12px 24px;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:disabled { background: #999; cursor: not-allowed; }

    .status {
      font-size: 13px;
      color: #666;
      min-height: 20px;
      margin-bottom: 1rem;
    }

    .report-box {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.5rem;
      min-height: 200px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.8;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Research Agent</h1>

    <div class="input-row">
      <input
        type="text"
        id="topic"
        placeholder="Enter a research topic..."
        onkeydown="if(event.key==='Enter') startResearch()"
      />
      <button id="btn" onclick="startResearch()">Research</button>
    </div>

    <div class="status" id="status"></div>
    <div class="report-box" id="report">Your report will appear here...</div>
  </div>
   <script>
    async function startResearch() {
      const topic = document.getElementById('topic').value.trim()
      if (!topic) return

      const btn    = document.getElementById('btn')
      const status = document.getElementById('status')
      const report = document.getElementById('report')

      btn.disabled   = true
      report.textContent = ''
      status.textContent = 'Starting...'

      try {
        const response = await fetch('/research/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic })
        })

        const reader  = response.body.getReader()
        const decoder = new TextDecoder()

        while (true) {
          const { done, value } = await reader.read()
          if (done) break

          const text  = decoder.decode(value)
          const lines = text.split('\n')

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue
            const data = line.slice(6)

            if (data.startsWith('[STATUS:')) {
              const node = data.replace('[STATUS:', '').replace(']', '')
              status.textContent = statusLabel(node)
            } else {
              report.textContent += data
            }
          }
        }

        status.textContent = 'Done.'

      } catch (err) {
        status.textContent = 'Error: ' + err.message
      } finally {
        btn.disabled = false
      }
    }

    function statusLabel(node) {
      const labels = {
        supervisor: 'Supervisor deciding next step...',
        searcher:   'Searching the web...',
        analyst:    'Analyzing sources...',
        writer:     'Writing report...'
      }
      return labels[node] || node
    }
  </script>
</body>
</html>
